<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mondrian Project</title>
  <style>
    body {
      display: flex;
      height: 100vh;
      justify-content: center;
      align-items: center;
      padding: 0;
      margin: 0;
    }
    .container {
      display: grid;
      width: 748px;
      height: 748px;
      grid-template-rows: 414px 130px 155px 22px;
      grid-template-columns: 320px 198px 153px 50px;
      gap: 9px;
      background-color: #000;
    }
    .red {
      background-color: #E72F24;
    }
    .grey1 {
      background-color: #F0F1EC;
      grid-column: span 3;
    }
    .grey2 {
      background-color: #F0F1EC;
      grid-row: span 2;
    }
    .grey3 {
      background-color: #F0F1EC;
      grid-area: 2/2/4/4;
    }
    .blue {
      background-color: #004592;
    }
    .grey4 {
      background-color: #F0F1EC;
      grid-row: span 2;
      border-top: 10px solid #000;
    }
    .grey5 {
      background-color: #F0F1EC;
    }
    .yellow {
      background-color: #F9D01E;
    }
    .black {
      background-color: #232629;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="red"></div>
    <div class="grey1"></div>
    <div class="grey2"></div>
    <div class="grey3"></div>
    <div class="blue"></div>
    <div class="grey4"></div>
    <div class="grey5"></div>
    <div class="yellow"></div>
    <div class="black"></div>
  </div>
</body>

</html>
